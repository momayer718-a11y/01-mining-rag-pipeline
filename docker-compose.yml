services:
  rag-api:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - MODEL_API_KEY=${MODEL_API_KEY:-}
      - MODEL_BASE_URL=${MODEL_BASE_URL:-https://api.deepseek.com}
      - MODEL_NAME=${MODEL_NAME:-deepseek-v4-pro}
      - MODEL_REASONING_EFFORT=${MODEL_REASONING_EFFORT:-medium}
      - MODEL_KEY_PASSPHRASE=${MODEL_KEY_PASSPHRASE:-}
    command: >
      sh -c "python -m pipeline.ingest --out data/runtime --per-source 20 &&
             uvicorn serve.app:app --host 0.0.0.0 --port 8001"
